<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Impossible Hinglish Quiz</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
text-align:center;
overflow-x:hidden;
}

/* Red flash effect */

.red-flash{
animation:redFlash 1.5s;
}

@keyframes redFlash{
0%{background:#ff0000;}
100%{background:#020617;}
}

/* Floating particles */

.particle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0.7;
animation:float 12s infinite linear;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* Quiz container */

.quiz-container{
max-width:650px;
margin:auto;
margin-top:40px;
background:rgba(0,0,0,0.65);
padding:30px;
border-radius:15px;
backdrop-filter:blur(10px);
transition:0.5s;
}

/* Hide quiz */

.hide{
opacity:0;
transform:scale(0.8);
}

/* Buttons */

button{
display:block;
width:100%;
margin:10px 0;
padding:14px;
border:none;
border-radius:10px;
background:#38bdf8;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:#0ea5e9;
}

/* Hint */

#hintBtn{
background:#facc15;
color:black;
}

#hint{
margin-top:10px;
color:#facc15;
}

/* Smoke animation */

.smoke{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:80px;
opacity:0;
pointer-events:none;
}

.smoke.show{
animation:smokeEffect 2s forwards;
}

@keyframes smokeEffect{

0%{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

100%{
opacity:0;
transform:translate(-50%,-120%) scale(2);
}

}

</style>
</head>

<body>

<h1>🧠 Impossible Hinglish Quiz</h1>

<div class="quiz-container">

<div id="question">Loading question...</div>

<div id="answers"></div>

<button id="hintBtn" onclick="showHint()">💡 Hint</button>

<div id="hint"></div>

</div>

<div id="smoke" class="smoke">💨</div>

<script>

/* Floating particles */

for(let i=0;i<30;i++){
let p=document.createElement("div")
p.className="particle"
p.style.left=Math.random()*100+"vw"
p.style.animationDuration=(6+Math.random()*8)+"s"
document.body.appendChild(p)
}

/* Quiz logic */

let questions=[]
let current=0
let score=0

fetch("questions.json")
.then(res=>res.json())
.then(data=>{
questions=data.sort(()=>0.5-Math.random()).slice(0,10)
loadQuestion()
})

function loadQuestion(){

let q=questions[current]

document.getElementById("question").innerText=(current+1)+". "+q.q

let html=""

q.a.forEach((ans,i)=>{
html+=`<button onclick="check(${i})">${ans}</button>`
})

document.getElementById("answers").innerHTML=html
document.getElementById("hint").innerText=""

}

function check(i){

if(i==questions[current].c){

score++
current++
loadQuestion()

}else{

let quiz=document.querySelector(".quiz-container")
let smoke=document.getElementById("smoke")

quiz.classList.add("hide")

document.body.classList.add("red-flash")

smoke.classList.add("show")

setTimeout(()=>{

smoke.classList.remove("show")
quiz.classList.remove("hide")
document.body.classList.remove("red-flash")

current++
loadQuestion()

},2000)

}

}

function showHint(){
document.getElementById("hint").innerText="Hint: "+questions[current].h
}

</script>

</body>
</html>
